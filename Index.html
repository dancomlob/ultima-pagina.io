<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Meu Blog de Livros</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">📚 Meu Blog de Livros</a></h1>
        <nav>
            <a href="/">Início</a>
            <a href="/sobre">Sobre</a>
        </nav>
    </header>
    
    <main>
        <h2>Últimas resenhas</h2>
        <ul>
            {% for post in site.posts %}
                <li>
                    <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
                    <p>{{ post.excerpt }}</p>
                    <small>{{ post.date | date: "%d/%m/%Y" }}</small>
                </li>
            {% endfor %}
        </ul>
    </main>
    
    <footer>
        <p>© 2026 - Meu Blog de Livros</p>
    </footer>
</body>
</html>
